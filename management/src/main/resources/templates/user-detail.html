<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유저 상세 - 1:1연애 관리자</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; }
        .sidebar { width: 250px; min-height: 100vh; background: #2c3e50; position: fixed; }
        .sidebar .nav-link { color: #bdc3c7; padding: 12px 20px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #34495e; color: #fff; }
        .sidebar .brand { padding: 20px; color: #fff; font-size: 18px; font-weight: 700; border-bottom: 1px solid #34495e; }
        .main-content { margin-left: 250px; padding: 20px; }
        .topbar { background: #fff; padding: 12px 24px; margin: -20px -20px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.1); display: flex; justify-content: space-between; align-items: center; }
        .info-row { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee; }
        .info-label { width: 120px; color: #7f8c8d; font-size: 14px; }
        .info-value { font-weight: 500; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand"><i class="bi bi-heart-fill text-danger"></i> 1:1연애 관리</div>
        <nav class="nav flex-column mt-2">
            <a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2 me-2"></i>대시보드</a>
            <a class="nav-link active" href="/users"><i class="bi bi-people me-2"></i>유저 관리</a>
            <a class="nav-link" href="/hearts/config"><i class="bi bi-gear me-2"></i>하트 설정</a>
            <a class="nav-link" href="/hearts/logs"><i class="bi bi-list-ul me-2"></i>거래 로그</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="topbar">
            <div>
                <a href="/users" class="text-decoration-none text-muted me-2"><i class="bi bi-arrow-left"></i></a>
                <span class="fw-semibold" th:text="'유저 #' + ${user.id} + ' - ' + ${user.name}"></span>
            </div>
            <a href="/logout" class="btn btn-outline-secondary btn-sm">로그아웃</a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row g-4">
            <!-- User Info -->
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header">프로필 정보</div>
                    <div class="card-body">
                        <div class="text-center mb-3" th:if="${user.profileImage}">
                            <img th:src="${user.profileImage}" style="width:64px;height:64px;border-radius:50%">
                        </div>
                        <div class="info-row"><span class="info-label">ID</span><span class="info-value" th:text="${user.id}"></span></div>
                        <div class="info-row"><span class="info-label">이름</span><span class="info-value" th:text="${user.name}"></span></div>
                        <div class="info-row"><span class="info-label">전화번호</span><span class="info-value" th:text="${user.phone != null ? user.phone : '-'}"></span></div>
                        <div class="info-row"><span class="info-label">카카오ID</span><span class="info-value" th:text="${user.kakaoId != null ? user.kakaoId : '-'}"></span></div>
                        <div class="info-row"><span class="info-label">생년월일</span><span class="info-value" th:text="${user.birthDate != null ? user.birthDate.toString() : '-'}"></span></div>
                        <div class="info-row"><span class="info-label">성별</span><span class="info-value" th:text="${user.gender != null and user.gender == 'M' ? '남자' : (user.gender != null and user.gender == 'F' ? '여자' : '-')}"></span></div>
                        <div class="info-row"><span class="info-label">혈액형</span><span class="info-value" th:text="${user.bloodType != null ? user.bloodType : '-'}"></span></div>
                        <div class="info-row"><span class="info-label">MBTI</span><span class="info-value" th:text="${user.mbtiType != null ? user.mbtiType : '-'}"></span></div>
                        <div class="info-row"><span class="info-label">띠</span><span class="info-value" th:text="${user.zodiacAnimal != null ? user.zodiacAnimal : '-'}"></span></div>
                        <div class="info-row"><span class="info-label">연애상태</span><span class="info-value" th:text="${user.relationshipStatus != null ? user.relationshipStatus : '-'}"></span></div>
                        <div class="info-row"><span class="info-label">가입일</span><span class="info-value" th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"></span></div>
                        <div class="info-row border-0">
                            <span class="info-label">보유 하트</span>
                            <span class="info-value fs-4 text-danger fw-bold" th:text="${user.heartPoints}"></span>
                        </div>
                    </div>
                </div>

                <!-- Admin Permission -->
                <div class="card mt-3">
                    <div class="card-header"><i class="bi bi-shield-lock me-1"></i>관리자 권한</div>
                    <div class="card-body">
                        <div th:if="${isAdmin}" class="d-flex align-items-center justify-content-between">
                            <span class="badge bg-success fs-6"><i class="bi bi-check-circle me-1"></i>관리자</span>
                            <form method="post" th:action="@{'/users/' + ${user.id} + '/revoke-admin'}">
                                <button type="submit" class="btn btn-outline-danger btn-sm" onclick="return confirm('관리자 권한을 해제하시겠습니까?')">권한 해제</button>
                            </form>
                        </div>
                        <div th:unless="${isAdmin}">
                            <div th:if="${user.phone != null and !user.phone.isEmpty()}">
                                <p class="text-muted mb-2" style="font-size:14px">이 유저에게 관리자 권한을 부여하면 전화번호(<span th:text="${user.phone}"></span>)로 관리페이지에 로그인할 수 있습니다.</p>
                                <form method="post" th:action="@{'/users/' + ${user.id} + '/grant-admin'}">
                                    <button type="submit" class="btn btn-primary w-100" onclick="return confirm('관리자 권한을 부여하시겠습니까?')"><i class="bi bi-shield-plus me-1"></i>관리자 권한 부여</button>
                                </form>
                            </div>
                            <div th:if="${user.phone == null or user.phone.isEmpty()}">
                                <p class="text-muted mb-0" style="font-size:14px"><i class="bi bi-exclamation-triangle me-1"></i>전화번호가 없어 관리자 권한을 부여할 수 없습니다.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Heart Adjust -->
                <div class="card mt-3">
                    <div class="card-header"><i class="bi bi-heart me-1 text-danger"></i>하트 조정</div>
                    <div class="card-body">
                        <form method="post" action="/hearts/adjust">
                            <input type="hidden" name="userId" th:value="${user.id}">
                            <div class="mb-3">
                                <label class="form-label">수량 (음수=차감)</label>
                                <input type="number" name="amount" class="form-control" value="100" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">사유</label>
                                <input type="text" name="description" class="form-control" value="관리자 조정">
                            </div>
                            <button type="submit" class="btn btn-danger w-100">하트 조정</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Heart Logs -->
            <div class="col-md-7">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>최근 하트 거래 내역</span>
                        <a th:href="@{'/hearts/logs?userId=' + ${user.id}}" class="btn btn-sm btn-outline-primary">전체 보기</a>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-sm mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>유형</th>
                                    <th>수량</th>
                                    <th>잔액</th>
                                    <th>설명</th>
                                    <th>일시</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="log : ${logs}">
                                    <td>
                                        <span class="badge" th:classappend="${log.amount > 0 ? 'bg-success' : 'bg-warning'}" th:text="${log.transactionType}"></span>
                                    </td>
                                    <td th:classappend="${log.amount > 0 ? 'text-success' : 'text-danger'}" th:text="${(log.amount > 0 ? '+' : '') + log.amount}"></td>
                                    <td th:text="${log.balanceAfter}"></td>
                                    <td th:text="${log.description ?: '-'}" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></td>
                                    <td th:text="${#temporals.format(log.createdAt, 'MM-dd HH:mm')}"></td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(logs)}">
                                    <td colspan="5" class="text-center text-muted py-3">거래 내역이 없습니다.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
