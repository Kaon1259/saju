<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>거래 로그 - 1:1연애 관리자</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; }
        .sidebar { width: 250px; min-height: 100vh; background: #2c3e50; position: fixed; }
        .sidebar .nav-link { color: #bdc3c7; padding: 12px 20px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #34495e; color: #fff; }
        .sidebar .brand { padding: 20px; color: #fff; font-size: 18px; font-weight: 700; border-bottom: 1px solid #34495e; }
        .main-content { margin-left: 250px; padding: 20px; }
        .topbar { background: #fff; padding: 12px 24px; margin: -20px -20px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.1); display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand"><i class="bi bi-heart-fill text-danger"></i> 1:1연애 관리</div>
        <nav class="nav flex-column mt-2">
            <a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2 me-2"></i>대시보드</a>
            <a class="nav-link" href="/users"><i class="bi bi-people me-2"></i>유저 관리</a>
            <a class="nav-link" href="/hearts/config"><i class="bi bi-gear me-2"></i>하트 설정</a>
            <a class="nav-link active" href="/hearts/logs"><i class="bi bi-list-ul me-2"></i>거래 로그</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="topbar">
            <div>
                <h5 class="mb-0 d-inline">거래 로그</h5>
                <span th:if="${filterUserId}" class="badge bg-info ms-2" th:text="'유저 #' + ${filterUserId}"></span>
            </div>
            <div>
                <a th:if="${filterUserId}" href="/hearts/logs" class="btn btn-outline-secondary btn-sm me-2">전체 보기</a>
                <a href="/logout" class="btn btn-outline-secondary btn-sm">로그아웃</a>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover table-sm mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>유저ID</th>
                            <th>유형</th>
                            <th>수량</th>
                            <th>잔액</th>
                            <th>설명</th>
                            <th>분석타입</th>
                            <th>일시</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="log : ${logs.content}">
                            <td th:text="${log.id}"></td>
                            <td><a th:href="@{'/users/' + ${log.userId}}" th:text="${log.userId}"></a></td>
                            <td>
                                <span class="badge" th:classappend="${log.amount > 0 ? 'bg-success' : 'bg-warning'}" th:text="${log.transactionType}"></span>
                            </td>
                            <td th:classappend="${log.amount > 0 ? 'text-success fw-bold' : 'text-danger fw-bold'}" th:text="${(log.amount > 0 ? '+' : '') + log.amount}"></td>
                            <td th:text="${log.balanceAfter}"></td>
                            <td th:text="${log.description ?: '-'}" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></td>
                            <td th:text="${log.analysisType ?: '-'}" style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></td>
                            <td th:text="${#temporals.format(log.createdAt, 'MM-dd HH:mm:ss')}"></td>
                        </tr>
                        <tr th:if="${logs.content.isEmpty()}">
                            <td colspan="8" class="text-center text-muted py-4">거래 내역이 없습니다.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="card-footer" th:if="${logs.totalPages > 1}">
                <nav>
                    <ul class="pagination pagination-sm mb-0 justify-content-center">
                        <li class="page-item" th:classappend="${logs.first ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/hearts/logs(userId=${filterUserId}, page=${logs.number - 1})}">이전</a>
                        </li>
                        <li th:each="i : ${#numbers.sequence(0, logs.totalPages - 1)}" class="page-item" th:classappend="${i == logs.number ? 'active' : ''}" th:if="${i < 10}">
                            <a class="page-link" th:href="@{/hearts/logs(userId=${filterUserId}, page=${i})}" th:text="${i + 1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${logs.last ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/hearts/logs(userId=${filterUserId}, page=${logs.number + 1})}">다음</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
        <p class="text-muted mt-2" th:text="'총 ' + ${logs.totalElements} + '건'"></p>
    </div>
</body>
</html>
