<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' - ' : ''}">1:1연애 관리자</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; }
        .sidebar { width: 250px; min-height: 100vh; background: #2c3e50; position: fixed; }
        .sidebar .nav-link { color: #bdc3c7; padding: 12px 20px; border-radius: 0; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #34495e; color: #fff; }
        .sidebar .brand { padding: 20px; color: #fff; font-size: 18px; font-weight: 700; border-bottom: 1px solid #34495e; }
        .main-content { margin-left: 250px; padding: 20px; }
        .topbar { background: #fff; padding: 12px 24px; margin: -20px -20px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.1); display: flex; justify-content: space-between; align-items: center; }
        .stat-card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .stat-card .stat-value { font-size: 28px; font-weight: 700; }
        .stat-card .stat-label { color: #7f8c8d; font-size: 14px; }
    </style>
</head>
<body>
    <div class="sidebar" th:fragment="sidebar">
        <div class="brand"><i class="bi bi-heart-fill text-danger"></i> 1:1연애 관리</div>
        <nav class="nav flex-column mt-2">
            <a class="nav-link" th:classappend="${#strings.startsWith(#httpServletRequest.requestURI, '/dashboard')} ? 'active'" href="/dashboard">
                <i class="bi bi-speedometer2 me-2"></i>대시보드
            </a>
            <a class="nav-link" th:classappend="${#strings.startsWith(#httpServletRequest.requestURI, '/users')} ? 'active'" href="/users">
                <i class="bi bi-people me-2"></i>유저 관리
            </a>
            <a class="nav-link" th:classappend="${#strings.startsWith(#httpServletRequest.requestURI, '/hearts/config')} ? 'active'" href="/hearts/config">
                <i class="bi bi-gear me-2"></i>하트 설정
            </a>
            <a class="nav-link" th:classappend="${#strings.startsWith(#httpServletRequest.requestURI, '/hearts/logs')} ? 'active'" href="/hearts/logs">
                <i class="bi bi-list-ul me-2"></i>거래 로그
            </a>
        </nav>
    </div>
</body>
</html>
