<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - 1:1연애</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #fff; border-radius: 16px; padding: 40px; width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
        .login-card h2 { font-weight: 700; margin-bottom: 8px; }
        .login-card .subtitle { color: #7f8c8d; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2><span style="color:#e74c3c">&#x2764;</span> 1:1연애 관리자</h2>
        <p class="subtitle">전화번호로 로그인하세요</p>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form method="post" action="/login">
            <div class="mb-3">
                <label class="form-label fw-semibold">전화번호</label>
                <input type="text" name="phone" class="form-control form-control-lg" placeholder="01012345678" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">로그인</button>
        </form>

        <p class="text-muted text-center mt-3" style="font-size:13px">기본 관리자: 01012345678</p>
    </div>
</body>
</html>
