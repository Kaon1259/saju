<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유저 관리 - 1:1연애 관리자</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; }
        .sidebar { width: 250px; min-height: 100vh; background: #2c3e50; position: fixed; }
        .sidebar .nav-link { color: #bdc3c7; padding: 12px 20px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #34495e; color: #fff; }
        .sidebar .brand { padding: 20px; color: #fff; font-size: 18px; font-weight: 700; border-bottom: 1px solid #34495e; }
        .main-content { margin-left: 250px; padding: 20px; }
        .topbar { background: #fff; padding: 12px 24px; margin: -20px -20px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.1); display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand"><i class="bi bi-heart-fill text-danger"></i> 1:1연애 관리</div>
        <nav class="nav flex-column mt-2">
            <a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2 me-2"></i>대시보드</a>
            <a class="nav-link active" href="/users"><i class="bi bi-people me-2"></i>유저 관리</a>
            <a class="nav-link" href="/hearts/config"><i class="bi bi-gear me-2"></i>하트 설정</a>
            <a class="nav-link" href="/hearts/logs"><i class="bi bi-list-ul me-2"></i>거래 로그</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h5 class="mb-0">유저 관리</h5>
            <div>
                <span class="me-3" th:text="${session.adminUser.name}">관리자</span>
                <a href="/logout" class="btn btn-outline-secondary btn-sm">로그아웃</a>
            </div>
        </div>

        <!-- Search -->
        <div class="card mb-3">
            <div class="card-body">
                <form method="get" action="/users" class="row g-2 align-items-end">
                    <div class="col-md-6">
                        <input type="text" name="search" class="form-control" placeholder="이름으로 검색" th:value="${search}">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-search me-1"></i>검색</button>
                    </div>
                    <div class="col-md-2" th:if="${!#strings.isEmpty(search)}">
                        <a href="/users" class="btn btn-outline-secondary">초기화</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Users Table -->
        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>이름</th>
                            <th>전화번호</th>
                            <th>카카오ID</th>
                            <th>생년월일</th>
                            <th>성별</th>
                            <th class="text-danger">하트</th>
                            <th>가입일</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users.content}">
                            <td th:text="${user.id}"></td>
                            <td>
                                <img th:if="${user.profileImage}" th:src="${user.profileImage}" style="width:24px;height:24px;border-radius:50%;margin-right:6px">
                                <span th:text="${user.name}"></span>
                            </td>
                            <td th:text="${user.phone != null ? user.phone : '-'}"></td>
                            <td th:text="${user.kakaoId != null ? (user.kakaoId.length() > 8 ? user.kakaoId.substring(0, 8) + '...' : user.kakaoId) : '-'}"></td>
                            <td th:text="${user.birthDate != null ? user.birthDate.toString() : '-'}"></td>
                            <td th:text="${user.gender != null and user.gender == 'M' ? '남' : (user.gender != null and user.gender == 'F' ? '여' : '-')}"></td>
                            <td class="fw-bold text-danger" th:text="${user.heartPoints != null ? user.heartPoints : 0}"></td>
                            <td th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'yyyy-MM-dd') : '-'}"></td>
                            <td><a th:href="@{'/users/' + ${user.id}}" class="btn btn-sm btn-outline-primary">상세</a></td>
                        </tr>
                        <tr th:if="${users.content.isEmpty()}">
                            <td colspan="9" class="text-center text-muted py-4">유저가 없습니다.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="card-footer" th:if="${users.totalPages > 1}">
                <nav>
                    <ul class="pagination pagination-sm mb-0 justify-content-center">
                        <li class="page-item" th:classappend="${users.first ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/users(search=${search}, page=${users.number - 1})}">이전</a>
                        </li>
                        <li th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}" class="page-item" th:classappend="${i == users.number ? 'active' : ''}" th:if="${i < 10}">
                            <a class="page-link" th:href="@{/users(search=${search}, page=${i})}" th:text="${i + 1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${users.last ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/users(search=${search}, page=${users.number + 1})}">다음</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
        <p class="text-muted mt-2" th:text="'총 ' + ${users.totalElements} + '명'"></p>
    </div>
</body>
</html>
