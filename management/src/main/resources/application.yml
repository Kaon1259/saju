server:
  port: 9090

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/saju_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=UTF-8
    username: root
    password: 1111
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  thymeleaf:
    cache: false

server.error:
  include-message: always
  include-stacktrace: always
  include-exception: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul
