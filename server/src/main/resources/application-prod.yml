server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT:3306}/${MYSQLDATABASE}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-uri: ${KAKAO_REDIRECT_URI}

claude:
  api-key: ${CLAUDE_API_KEY}
  model: ${CLAUDE_MODEL:claude-sonnet-4-6}

admin:
  secret: ${ADMIN_SECRET:}

# JWT 인증 — JWT_SECRET 환경변수 필수 (32자 이상)
jwt:
  secret: ${JWT_SECRET:dev-jwt-secret-change-me-min-32-chars-long-please}
  ttl-minutes: ${JWT_TTL_MINUTES:43200}
  sse-ttl-seconds: ${JWT_SSE_TTL_SECONDS:60}
  legacy-fallback: ${JWT_LEGACY_FALLBACK:true}

clova:
  tts:
    client-id: ${CLOVA_CLIENT_ID:none}
    client-secret: ${CLOVA_CLIENT_SECRET:none}
    speaker: vdain
    cache-dir: ./tts-cache
