server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/saju_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: YOUR_DB_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

claude:
  api-key: YOUR_CLAUDE_API_KEY
  model: claude-haiku-4-5-20251001

# Naver Clova TTS (https://www.ncloud.com/product/aiService/clovaSpeech)
clova:
  tts:
    client-id: YOUR_CLOVA_CLIENT_ID
    client-secret: YOUR_CLOVA_CLIENT_SECRET
    speaker: vdain        # vdain(여성,따뜻), nara(여성,밝음), jinho(남성,차분), ndain(아이)
    cache-dir: ./tts-cache
